appId: com.expense.tracker.iosApp
---
# Bottom Navigation Bar — iOS smoke flow
# Verifies: 3 tabs visible, tab switching

- clearState
- launchApp

# Verify bottom nav bar is visible with 3 tabs
- assertVisible: "Expenses"
- assertVisible: "Budgets"
- assertVisible: "Recurring"

# Verify we start on the Expenses tab
- assertVisible: "Expense Tracker"

# Tap Budgets tab
- tapOn: "Budgets"
- assertVisible: "Budgets"

# Tap Recurring tab
- tapOn: "Recurring"
- assertVisible: "Recurring Transactions"

# Tap Expenses tab to return
- tapOn: "Expenses"
- assertVisible: "Expense Tracker"
