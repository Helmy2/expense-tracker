appId: com.expense.tracker.ios
---
- clearState
- launchApp
- assertVisible: "Expense Tracker"
# Navigate to recurring list via the Recurring toolbar button
- tapOn: "Recurring"
- assertVisible: "Recurring Transactions"
- assertVisible: "No recurring transactions yet"
# Tap the plus button to create a new recurring template
- tapOn:
    id: "plus"
- assertVisible: "New Recurring"
# Enter amount
- tapOn: "Enter amount"
- inputText: "1500.00"
- pressKey: Enter
# Select type - tap Expense (should be default)
- tapOn: "Expense"
# Select a category - tap the picker to open it
- tapOn: "Other"
- tapOn: "Rent"
# Enter note
- tapOn: "Enter note"
- inputText: "Monthly rent"
- pressKey: Enter
# Select frequency - tap Monthly
- tapOn: "Monthly"
# Save the recurring template
- tapOn: "Save"
# Verify the template appears in the list
- assertVisible: ".*1500\\.00.*"
- assertVisible: "Monthly"
- assertVisible: "Rent"
